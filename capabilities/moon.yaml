naftiko: 1.0.0-alpha2
info:
  label: Moon-API.com
  description: 'Moon-API.com. 7 operations. Lead operation: Get detailed moon and sun data (MEGA plan). Self-contained Naftiko
    capability covering one Moon Api business surface.'
  tags:
  - Moon Api
  - Moon-API.com
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MOON_API_API_KEY: MOON_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: moon
    baseUri: https://moon-phase.p.rapidapi.com
    description: Moon-API.com business capability. Self-contained, no shared references.
    resources:
    - name: advanced
      path: /advanced
      operations:
      - name: get
        method: GET
        description: Get detailed moon and sun data (MEGA plan)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: astrology
      path: /astrology
      operations:
      - name: get
        method: GET
        description: Get astrology data (natal chart and planetary positions)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: basic
      path: /basic
      operations:
      - name: get
        method: GET
        description: Get basic moon phase information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: calendar
      path: /calendar
      operations:
      - name: get
        method: GET
        description: Get moon and sun data calendar
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start_date
          in: query
          type: string
          description: Start date (YYYY-MM-DD)
        - name: end_date
          in: query
          type: string
          description: End date (YYYY-MM-DD)
        - name: days
          in: query
          type: integer
          description: 'Number of days from today (if dates not provided, default: 30)'
    - name: emoji
      path: /emoji
      operations:
      - name: get
        method: GET
        description: Get current moon phase emoji (plain text)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: phase
      path: /phase
      operations:
      - name: get
        method: GET
        description: Get moon phase information only
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: plain-text
      path: /plain-text
      operations:
      - name: get
        method: GET
        description: Get moon phase name (plain text)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-rapidapi-key
      value: '{{env.MOON_API_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: moon-rest
    port: 8080
    description: REST adapter for Moon-API.com. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/advanced
      name: advanced
      description: REST surface for advanced.
      operations:
      - method: GET
        name: get
        description: Get detailed moon and sun data (MEGA plan)
        call: moon.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/astrology
      name: astrology
      description: REST surface for astrology.
      operations:
      - method: GET
        name: get
        description: Get astrology data (natal chart and planetary positions)
        call: moon.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/basic
      name: basic
      description: REST surface for basic.
      operations:
      - method: GET
        name: get
        description: Get basic moon phase information
        call: moon.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/calendar
      name: calendar
      description: REST surface for calendar.
      operations:
      - method: GET
        name: get
        description: Get moon and sun data calendar
        call: moon.get
        with:
          start_date: rest.start_date
          end_date: rest.end_date
          days: rest.days
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/emoji
      name: emoji
      description: REST surface for emoji.
      operations:
      - method: GET
        name: get
        description: Get current moon phase emoji (plain text)
        call: moon.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/phase
      name: phase
      description: REST surface for phase.
      operations:
      - method: GET
        name: get
        description: Get moon phase information only
        call: moon.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/plain-text
      name: plain-text
      description: REST surface for plain-text.
      operations:
      - method: GET
        name: get
        description: Get moon phase name (plain text)
        call: moon.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: moon-mcp
    port: 9090
    transport: http
    description: MCP adapter for Moon-API.com. One tool per consumed operation, routed inline through this capability's consumes
      block.
    tools:
    - name: get-detailed-moon-and-sun
      description: Get detailed moon and sun data (MEGA plan)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: moon.get
      outputParameters:
      - type: object
        mapping: $.
    - name: get-astrology-data-natal-chart
      description: Get astrology data (natal chart and planetary positions)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: moon.get
      outputParameters:
      - type: object
        mapping: $.
    - name: get-basic-moon-phase-information
      description: Get basic moon phase information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: moon.get
      outputParameters:
      - type: object
        mapping: $.
    - name: get-moon-and-sun-data
      description: Get moon and sun data calendar
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: moon.get
      with:
        start_date: tools.start_date
        end_date: tools.end_date
        days: tools.days
      outputParameters:
      - type: object
        mapping: $.
    - name: get-current-moon-phase-emoji
      description: Get current moon phase emoji (plain text)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: moon.get
      outputParameters:
      - type: object
        mapping: $.
    - name: get-moon-phase-information-only
      description: Get moon phase information only
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: moon.get
      outputParameters:
      - type: object
        mapping: $.
    - name: get-moon-phase-name-plain
      description: Get moon phase name (plain text)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: moon.get
      outputParameters:
      - type: object
        mapping: $.
