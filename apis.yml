aid: moon-api
specificationVersion: '0.19'
name: Moon-API
description: >-
  Moon-API.com provides real-time lunar and astronomical data including moon
  phases, illumination, moonrise and moonset times, sun data, calendars, and
  astrology data such as natal charts, planetary positions, aspects, and house
  cusps. The API is offered through the RapidAPI marketplace with global edge
  caching for low-latency responses.
